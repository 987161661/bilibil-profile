<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Bilibili Profile</title>
  <desc id="desc">Privacy-first Bilibili interest profiling</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#10223c"/>
      <stop offset="1" stop-color="#0d1728"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb7299"/>
      <stop offset="1" stop-color="#55d8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <circle cx="1060" cy="70" r="150" fill="#fb7299" opacity=".13" filter="url(#glow)"/>
  <circle cx="930" cy="330" r="190" fill="#55d8ff" opacity=".12" filter="url(#glow)"/>
  <g transform="translate(84 75)">
    <rect width="210" height="210" rx="54" fill="#111d30" stroke="url(#accent)" stroke-width="6"/>
    <path d="M52 78 78 49M158 78 132 49" fill="none" stroke="#dcecff" stroke-width="10" stroke-linecap="round"/>
    <rect x="38" y="72" width="134" height="96" rx="28" fill="none" stroke="#dcecff" stroke-width="10"/>
    <circle cx="82" cy="119" r="10" fill="#fb7299"/>
    <circle cx="128" cy="119" r="10" fill="#55d8ff"/>
    <path d="M76 146c19 12 39 12 58 0" fill="none" stroke="#dcecff" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="350" y="145" fill="#f7fbff" font-family="Inter,Arial,sans-serif" font-size="68" font-weight="760">Bilibili Profile</text>
  <text x="353" y="205" fill="#9eb4cf" font-family="Inter,Arial,sans-serif" font-size="27">Local-first · Read-only · Evidence-weighted</text>
  <rect x="351" y="241" width="510" height="4" rx="2" fill="url(#accent)"/>
  <text x="353" y="295" fill="#d5e4f6" font-family="PingFang SC,Noto Sans CJK SC,Arial,sans-serif" font-size="25">看懂你的兴趣，而不是给你贴标签。</text>
</svg>

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile scripts
        run: python -m py_compile analyze-bilibili-profile/scripts/*.py
      - name: Run offline analyzer tests
        run: ./analyze-bilibili-profile/tests/test_offline.sh
      - name: Run exporter pagination tests
        run: ./analyze-bilibili-profile/tests/test_exporter.sh
      - name: Validate repository has no generated credentials
        run: |
          if grep -RInE --exclude-dir=.git \
            '"(sessdata|bili_jct|ac_time_value|buvid3|buvid4)"[[:space:]]*:[[:space:]]*"[^"]+"' .; then
            echo "Credential-like value found in repository"
            exit 1
          fi

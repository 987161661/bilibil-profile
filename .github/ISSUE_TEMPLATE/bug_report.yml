name: Bug report
description: Report a reproducible defect using synthetic or redacted data.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping. Never include cookies, QR-login links, account IDs, or raw personal exports.
  - type: checkboxes
    id: safety
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials and personal data from this report.
          required: true
        - label: This is not a vulnerability that should be reported privately.
          required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Codex Skill workflow
        - Exporter
        - Analyzer
        - Validator
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Safe reproduction
      description: Prefer synthetic fixtures and redact paths or identifiers.
      render: shell
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Python 3.12
    validations:
      required: true

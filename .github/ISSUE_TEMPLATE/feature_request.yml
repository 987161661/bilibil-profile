name: Feature request
description: Suggest a privacy-preserving improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: The proposal preserves local-first, read-only operation.
          required: true
        - label: The proposal does not require publishing personal account data.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
